# SonarQube analysis configuration for the Payment App.
#
# The backend is a Maven module, so analysis is normally driven by the
# sonar-maven-plugin (`mvn sonar:sonar`, see buildspec.yml). These properties
# apply when the standalone sonar-scanner CLI is used instead, and document the
# project layout / coverage source for both paths.

sonar.projectKey=payment-app
sonar.projectName=Payment App
sonar.projectVersion=1.0.11

# --- Sources / tests ---
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes
sonar.sourceEncoding=UTF-8

# --- Coverage ---
# Backend: JaCoCo XML produced by `mvn verify`.
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
# Frontend: LCOV produced by `vitest run --coverage` (see buildspec.yml).
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Mirror the JaCoCo gate: exclude generated/boilerplate and framework bootstrap
# glue (entities/DTOs, Spring @Configuration wiring, the prod-only AWS SNS gateway).
sonar.coverage.exclusions=\
  backend/src/main/java/com/paymentapp/entity/**,\
  backend/src/main/java/com/paymentapp/dto/**,\
  backend/src/main/java/com/paymentapp/config/**,\
  backend/src/main/java/com/paymentapp/service/SnsSmsSender.java,\
  backend/src/main/java/com/paymentapp/PaymentAppApplication.java,\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/setupTests.ts,\
  frontend/src/main.tsx

# Frontend test files are tests, not analyzable source.
sonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx