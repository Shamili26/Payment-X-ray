# SonarQube configuration — payment-app backend (Java 11 / Spring Boot)
#
# Two ways to analyze this module:
#   1. Maven plugin (recommended): `mvn clean verify sonar:sonar`
#      -> The plugin reads pom.xml, auto-detects target/site/jacoco/jacoco.xml,
#         and IGNORES this file. Pass host/token on the command line or via env.
#   2. Standalone scanner: `sonar-scanner` from this directory uses the values
#      below. Generate the report first with `mvn clean test`.

sonar.projectKey=payment-app-backend
sonar.projectName=Payment App Backend
sonar.projectVersion=1.0.14

# Sources / tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.libraries=target/dependency/*.jar
sonar.sourceEncoding=UTF-8

# Coverage — JaCoCo XML report produced by `mvn test`
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude from coverage the same boilerplate/bootstrap excluded by the
# JaCoCo gate in pom.xml (entities, DTOs, Spring config, prod-only SNS gateway).
sonar.coverage.exclusions=\
  src/main/java/com/paymentapp/entity/**,\
  src/main/java/com/paymentapp/dto/**,\
  src/main/java/com/paymentapp/config/**,\
  src/main/java/com/paymentapp/service/SnsSmsSender.java,\
  src/main/java/com/paymentapp/PaymentAppApplication.java

# Server (override per environment / CI). Prefer SONAR_TOKEN env var over a token here.
# sonar.host.url=http://localhost:9000
# sonar.token=
