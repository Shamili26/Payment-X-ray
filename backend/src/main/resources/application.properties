spring.application.name=payment-app-backend

# --- Database ---
# When deployed (prod profile active), DB_URL/DB_USERNAME/DB_PASSWORD are loaded
# from AWS Secrets Manager (see the prod section at the bottom of this file) and
# resolved by the placeholders below. Without the prod profile (tests / local
# dev) the defaults apply, so the test suite never contacts AWS.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver


# --- JPA / Hibernate ---how
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# Resolved from the JWT_SECRET key in AWS Secrets Manager when the prod profile
# is active (see the prod section at the bottom of this file).
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# --- Session idle timeout ---
# Auto-logout after this many minutes of inactivity. Enforced server-side in
# JwtAuthenticationFilter (a session idle longer than this is deactivated) and
# mirrored by the frontend, which signs the user out and returns to the login
# screen. This is independent of app.jwt.expiration-ms, which is the absolute
# session cap regardless of activity.
app.session.idle-timeout-minutes=15

# --- MFA (payment OTP) ---
app.mfa.otp.expiry-seconds=300


app.mfa.otp.max-attempts=3

# --- Jackson ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd

# --- Server ---
server.port=8084
server.error.include-message=always

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173,https://d1o9xb625jkgbk.cloudfront.net

# --- Security cookies ---
# JWT cookie is sent cross-site (frontend host -> API host). SameSite=None
# REQUIRES Secure; for local HTTP dev set same-site=Lax and cookie.secure=false.
app.security.cookie.same-site=None
app.security.cookie.secure=true

# --- Logging ---
logging.level.com.paymentapp=DEBUG
logging.level.org.springframework.security=INFO

# Directory where log files are written (see logback-spring.xml).
# Defaults to a "logs" folder next to the running app. Override per environment, e.g.:
#   Linux  : --log.path=/var/log/payment-app   (or env var LOG_PATH=/var/log/payment-app)
#   Windows: --log.path=C:/payment-app/logs
log.path=logs
log.file.name=payment-app

# --- Rate limiting (Bucket4j) ---
# Per-client token bucket enforced ahead of the security chain. Steady-state
# rate = capacity / refill-period-seconds (default 100 req/s, HTTP 429 on breach).
app.ratelimit.enabled=true
app.ratelimit.capacity=100
app.ratelimit.refill-period-seconds=1

# --- Payment completion scheduler ---
# Cron for the job that flips due PENDING payments to COMPLETED (every minute).
app.scheduler.payment-completion.cron=0 * * * * *

# --- Observability (Actuator / Micrometer) ---
# Health + Prometheus + metrics surface. CloudWatch export is OFF by default so
# tests/local never reach AWS; the prod profile turns it on (see
# application-prod.properties).
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.export.cloudwatch.enabled=false

# NOTE: the prod profile lives in application-prod.properties. Activate it on the
# deployed environment with SPRING_PROFILES_ACTIVE=prod (or
# --spring.profiles.active=prod). It is a separate file so the test suite, which
# runs with no active profile, never loads AWS Secrets Manager / SNS / CloudWatch.
