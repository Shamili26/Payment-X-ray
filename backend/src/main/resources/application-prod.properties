#-------------------------------------------------------------------------------
# PROD profile — activated on the deployed environment with
# SPRING_PROFILES_ACTIVE=prod (or --spring.profiles.active=prod).
#
# Kept in its own file (not application.properties) so the test suite — which
# runs with no active profile — never loads AWS Secrets Manager, SNS, or the
# CloudWatch metrics exporter.
#
# Loads the DB credentials and JWT secret from AWS Secrets Manager. The secret
# (name overridable via AWS_SECRET_NAME) is a JSON document with these keys,
# resolved by the placeholders in application.properties:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET
# The instance's IAM role must grant secretsmanager:GetSecretValue, and the SMS
# OTP beans (SnsSmsSender/AwsSnsConfig) activate under this profile too.
#-------------------------------------------------------------------------------

spring.config.import=aws-secretsmanager:${AWS_SECRET_NAME:payment-app/prod}
# NOTE: awspring 2.4 ignores spring.cloud.aws.region.static for the config-data
# import, so the AWS region is supplied to the SDK via -Daws.region in the
# Procfile. On EB, credentials come from the instance IAM role (IMDS).
cloud.aws.stack.auto=false

# --- SMS (AWS SNS) — real OTP delivery under prod ---
app.sms.aws.region=${AWS_REGION:us-east-1}
app.sms.aws.sender-id=${SMS_SENDER_ID:PAYFLOW}
app.sms.aws.sms-type=${SMS_TYPE:Transactional}

# --- Observability — CloudWatch metrics export (prod only) ---
# Ships Micrometer metrics to CloudWatch under the given namespace. Credentials
# come from the instance IAM role; the role must allow cloudwatch:PutMetricData.
management.metrics.export.cloudwatch.enabled=true
management.metrics.export.cloudwatch.namespace=${CLOUDWATCH_NAMESPACE:PaymentApp}
management.metrics.export.cloudwatch.step=1m
management.metrics.export.cloudwatch.batch-size=20
cloud.aws.region.static=${AWS_REGION:us-east-1}

# --- Observability — AWS X-Ray distributed tracing (prod only) ---
# The AWSXRayServletFilter is registered by XRayConfig (prod profile only) and
# opens a trace segment per request under this name; downstream AWS SDK calls
# (SNS, Secrets Manager, CloudWatch) appear as subsegments in the service map.
# Segments are shipped to the X-Ray daemon at AWS_XRAY_DAEMON_ADDRESS
# (default 127.0.0.1:2000); the instance IAM role must allow
# xray:PutTraceSegments and xray:PutTelemetryRecords.
app.xray.segment-name=${XRAY_SEGMENT_NAME:PaymentApp}