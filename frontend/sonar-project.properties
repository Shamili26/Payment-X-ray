# SonarQube configuration — payment-app frontend (React 19 / TypeScript / Vite)
#
# Generate coverage first:  npm run coverage   (-> coverage/lcov.info)
# Then analyze:             sonar-scanner       (run from this directory)

sonar.projectKey=payment-app-frontend
sonar.projectName=Payment App Frontend
sonar.projectVersion=0.0.0

# Sources / tests
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.sourceEncoding=UTF-8

# Coverage — lcov report produced by `vitest run --coverage` (see vitest.config.ts)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Keep non-testable/generated files out of the coverage denominator,
# mirroring the exclude list in vitest.config.ts.
sonar.coverage.exclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/main.tsx,\
  src/vite-env.d.ts,\
  src/types.ts,\
  src/setupTests.ts

# Don't scan build output or deps
sonar.exclusions=node_modules/**,dist/**,coverage/**

# Server (override per environment / CI). Prefer SONAR_TOKEN env var over a token here.
# sonar.host.url=http://localhost:9000
# sonar.token=